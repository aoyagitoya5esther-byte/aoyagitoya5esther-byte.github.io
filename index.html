<!DOCTYPE html>
<html lang="zh-TW">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>台灣生物多樣性地圖</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<style>
body{
    margin:0;
    font-family:Arial;
}

h1{
    background:green;
    color:white;
    margin:0;
    padding:15px;
    text-align:center;
}

#map{
    height:90vh;
}
</style>

</head>

<body>

<h1>🌿 台灣生物多樣性地圖 🌿</h1>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([23.8,121],7);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{
    maxZoom:18
}).addTo(map);

// 阿里山
L.marker([23.51,120.80]).addTo(map)
.bindPopup("🌲 阿里山<br>🐦 帝雉");

// 玉山
L.marker([23.47,120.96]).addTo(map)
.bindPopup("🐻 玉山<br>台灣黑熊");

// 墾丁
L.marker([21.95,120.78]).addTo(map)
.bindPopup("🐢 墾丁<br>綠蠵龜");

// 台江
L.marker([23.02,120.14]).addTo(map)
.bindPopup("🦆 台江<br>黑面琵鷺");

</script>

</body>

</html>
